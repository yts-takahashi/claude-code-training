@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Overlay -->
    <div
      class="absolute inset-0 bg-black/50 transition-opacity"
      (click)="onOverlayClick()"
    ></div>

    <!-- Modal -->
    <div [class]="modalClasses">
      <!-- Header -->
      @if (title) {
        <div class="flex items-center justify-between px-6 py-4 border-b border-fin-border">
          <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
          <button
            (click)="onClose()"
            class="p-1 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      }

      <!-- Body -->
      <div class="px-6 py-4">
        <ng-content></ng-content>
      </div>

      <!-- Footer -->
      @if (confirmMode) {
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-fin-border bg-gray-50 rounded-b-lg">
          <button
            (click)="onClose()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-fin-border rounded-md hover:bg-gray-50"
          >
            {{ cancelText }}
          </button>
          <button
            (click)="onConfirm()"
            [class]="confirmButtonClasses"
          >
            {{ confirmText }}
          </button>
        </div>
      }
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
}
