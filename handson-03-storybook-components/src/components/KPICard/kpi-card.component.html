<div [class]="cardClasses" [title]="tooltip || ''">
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <p class="text-sm font-medium text-gray-500">{{ title }}</p>
      <div class="mt-2 flex items-baseline gap-1">
        <span class="text-2xl font-bold text-gray-900">{{ formattedValue }}</span>
        @if (unit) {
          <span class="text-sm text-gray-500">{{ unit }}</span>
        }
      </div>
    </div>
    <ng-content select="[icon]"></ng-content>
  </div>

  @if (changeRate != null) {
    <div class="mt-3 flex items-center gap-1">
      @if (isPositive) {
        <svg class="w-4 h-4 text-fin-success" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 4l8 8h-6v8h-4v-8H4z" />
        </svg>
      }
      @if (isNegative) {
        <svg class="w-4 h-4 text-fin-danger" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 20l-8-8h6V4h4v8h6z" />
        </svg>
      }
      <span
        [class]="'text-sm font-medium ' + (isPositive ? 'text-fin-success' : isNegative ? 'text-fin-danger' : '')"
      >
        {{ changeRateFormatted }}
      </span>
      <span class="text-xs text-gray-400 ml-1">{{ changeLabel }}</span>
    </div>
  }

  @if (hasSparkline) {
    <svg width="120" height="32" class="mt-2">
      <polyline
        fill="none"
        [attr.stroke]="sparklineColor"
        stroke-width="2"
        [attr.points]="sparklineSvgPoints"
      />
    </svg>
  }
</div>
