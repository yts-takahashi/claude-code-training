<div [class]="'relative ' + className">
  <button
    (click)="toggleOpen()"
    class="relative p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100"
  >
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
    </svg>
    @if (unreadCount > 0) {
      <span class="absolute -top-1 -right-1 flex items-center justify-center min-w-[18px] h-[18px] px-1 text-xs font-bold text-white bg-fin-danger rounded-full">
        {{ displayUnreadCount }}
      </span>
    }
  </button>

  @if (isOpen) {
    <div class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg border border-fin-border z-50">
      <div class="flex items-center justify-between px-4 py-3 border-b border-fin-border">
        <h4 class="text-sm font-semibold text-gray-900">通知</h4>
        @if (unreadCount > 0) {
          <button
            (click)="onMarkAllAsRead()"
            class="text-xs text-fin-primary hover:underline"
          >
            すべて既読にする
          </button>
        }
      </div>

      <div class="max-h-80 overflow-y-auto">
        @if (notifications.length === 0) {
          <p class="px-4 py-8 text-sm text-gray-400 text-center">通知はありません</p>
        } @else {
          @for (notification of notifications; track notification.id) {
            <div
              class="flex gap-3 px-4 py-3 border-b border-fin-border last:border-0 cursor-pointer hover:bg-gray-50"
              [class.bg-blue-50/50]="!notification.read"
              (click)="onNotificationItemClick(notification)"
            >
              <svg
                [class]="'w-5 h-5 flex-shrink-0 mt-0.5 ' + getIconColor(notification.type)"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIconPath(notification.type)" />
              </svg>
              <div class="flex-1 min-w-0">
                <p [class]="'text-sm ' + (!notification.read ? 'font-semibold text-gray-900' : 'text-gray-700')">
                  {{ notification.title }}
                </p>
                <p class="text-xs text-gray-500 mt-0.5 truncate">{{ notification.message }}</p>
                <p class="text-xs text-gray-400 mt-1">{{ notification.timestamp }}</p>
              </div>
              @if (!notification.read) {
                <div class="w-2 h-2 bg-fin-primary rounded-full flex-shrink-0 mt-2"></div>
              }
            </div>
          }
        }
      </div>
    </div>
  }
</div>
